<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · SportFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
            background:linear-gradient(135deg,#eaf4ff 0%,#e8faf0 30%,#f0f9ff 60%,#edf4fe 100%);
            background-size:400% 400%;animation:gradientBG 12s ease infinite;
            position:relative;overflow-x:hidden
        }
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 30%,rgba(0,87,179,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(0,168,107,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
        @keyframes gradientBG{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        @keyframes ripple{to{transform:scale(4);opacity:0}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:transform:translateY(0)}}
        .anim-up{animation:fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0}
        .shake{animation:shake 0.4s ease}
        .float{animation:float 4s ease-in-out infinite}
        .glass-card{background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.3);box-shadow:0 8px 32px rgba(0,87,179,0.08)}
        .ripple-btn{position:relative;overflow:hidden;cursor:pointer}
        .ripple-btn .ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,0.35);transform:scale(0);animation:ripple 0.6s linear;pointer-events:none}
        .input-glow input:focus{box-shadow:0 0 0 3px rgba(0,87,179,0.12);border-color:#0057b3!important}
    </style>
</head>
<body>
<div id="app">
    <!-- 装饰浮动球 -->
    <div class="fixed top-20 left-10 w-32 h-32 rounded-full opacity-[0.06] float pointer-events-none" style="background:radial-gradient(circle,#0057b3,transparent 70%);animation-duration:6s"></div>
    <div class="fixed bottom-20 right-10 w-40 h-40 rounded-full opacity-[0.05] float pointer-events-none" style="background:radial-gradient(circle,#00a86b,transparent 70%);animation-duration:8s;animation-delay:-2s"></div>

    <div class="w-full max-w-md relative z-10 anim-up">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 no-underline group">
                <span class="material-symbols-outlined text-4xl float transition-transform duration-300 group-hover:scale-110" style="color:#0057b3">sports_soccer</span>
                <span class="font-lexend text-2xl font-bold" style="color:#1a2332">Sport<span style="color:#0057b3">Flow</span></span>
            </a>
            <p class="text-sm mt-2" style="color:#5a6b7d">欢迎回来，登录后继续预约场馆</p>
        </div>

        <div class="glass-card rounded-2xl p-8 transition-all duration-300 hover:shadow-xl">
            <form @submit.prevent="handleLogin">
                <div class="mb-5 input-glow">
                    <label class="block text-sm font-medium mb-1.5" style="color:#1a2332">邮箱地址</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 transition-colors duration-300" :class="emailFocus?'text-[#0057b3]':'text-gray-400'">
                            <span class="material-symbols-outlined text-lg">email</span>
                        </span>
                        <input type="email" v-model="email" required @focus="emailFocus=true" @blur="emailFocus=false"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border text-sm outline-none transition-all duration-300"
                            :class="err.email?'border-red-400 bg-red-50':'border-gray-200 bg-white hover:border-gray-300'"
                            placeholder="请输入邮箱地址" @focus="err.email=false">
                    </div>
                </div>

                <div class="mb-5 input-glow">
                    <label class="block text-sm font-medium mb-1.5" style="color:#1a2332">密码</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 transition-colors duration-300" :class="pwdFocus?'text-[#0057b3]':'text-gray-400'">
                            <span class="material-symbols-outlined text-lg">lock</span>
                        </span>
                        <input :type="showPwd?'text':'password'" v-model="password" required
                            @focus="pwdFocus=true" @blur="pwdFocus=false"
                            class="w-full pl-10 pr-12 py-3 rounded-xl border text-sm outline-none transition-all duration-300"
                            :class="err.password?'border-red-400 bg-red-50':'border-gray-200 bg-white hover:border-gray-300'"
                            placeholder="请输入密码" @focus="err.password=false">
                        <button type="button" @click="showPwd=!showPwd"
                            class="absolute right-3 top-1/2 -translate-y-1/2 transition-all duration-200 hover:scale-110"
                            :class="showPwd?'text-[#0057b3]':'text-gray-400'">
                            <span class="material-symbols-outlined text-lg">{{showPwd?'visibility_off':'visibility'}}</span>
                        </button>
                    </div>
                </div>

                <div v-if="errorMsg" class="mb-4 p-3 rounded-xl flex items-center gap-2 text-sm shake" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#b91c1c">
                    <span class="material-symbols-outlined text-lg">error</span>{{errorMsg}}
                </div>

                <button type="submit" :disabled="loading"
                    class="ripple-btn w-full py-3 rounded-xl font-semibold text-sm transition-all duration-300 flex items-center justify-center gap-2 text-white relative"
                    :class="loading?'bg-gray-300 cursor-not-allowed':'hover:shadow-xl hover:scale-[0.98]'"
                    style="background:linear-gradient(135deg,#0057b3,#0078d4);background-size:200% 200%">
                    <span v-if="loading">
                        <span class="inline-flex items-center gap-2"><span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>登录中...</span>
                    </span>
                    <span v-else class="flex items-center gap-2">
                        登录
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </span>
                </button>
            </form>

            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 h-px" style="background:linear-gradient(90deg,transparent,#e5e7eb,transparent)"></div>
                <span class="text-xs" style="color:#9ca3af">或</span>
                <div class="flex-1 h-px" style="background:linear-gradient(90deg,transparent,#e5e7eb,transparent)"></div>
            </div>

            <p class="text-center text-sm" style="color:#5a6b7d">
                还没有账号？
                <a href="register.html" class="font-semibold relative inline-block after:absolute after:bottom-0 after:left-0 after:w-full after:h-0.5 after:rounded-full after:transition-all after:duration-300 hover:after:opacity-80" style="color:#0057b3;--tw-after-bg:#0057b3">立即注册</a>
            </p>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="inline-flex items-center gap-1 text-sm transition-all duration-200 hover:gap-2" style="color:#5a6b7d">
                <span class="material-symbols-outlined text-base">arrow_back</span>
                返回首页
            </a>
        </div>
    </div>
</div>
<script>
    const{createApp,ref}=Vue;
    createApp({setup(){
        const email=ref('');const password=ref('');const showPwd=ref(false);const loading=ref(false);
        const errorMsg=ref('');const err=ref({email:false,password:false});const emailFocus=ref(false);const pwdFocus=ref(false);
        async function handleLogin(){
            errorMsg.value='';if(!email.value||!password.value){errorMsg.value='请填写邮箱和密码';return;}
            loading.value=true;
            try{
                const res=await fetch('http://localhost:8000/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})});
                const data=await res.json();
                if(!res.ok){errorMsg.value=data.detail||'登录失败';err.value.email=true;err.value.password=true;return;}
                localStorage.setItem('token',data.token);localStorage.setItem('user',JSON.stringify(data.user));
                const r=data.user.role;
                if(r==='admin')window.location.href='admin.html';
                else if(r==='provider')window.location.href='provider.html';
                else window.location.href='customer.html';
            }catch(e){errorMsg.value='网络连接失败，请检查后端服务是否已启动';}
            finally{loading.value=false;}
        }
        return{email,password,showPwd,loading,errorMsg,err,emailFocus,pwdFocus,handleLogin};
    }}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
